<!DOCTYPE html>
<html>
<head>
<title>Student Council Election</title>

<style>
.watermark{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    z-index:-1;
    pointer-events:none;
}

.watermark img{
    width:550px;
    opacity:0.15;
}
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    width:100%;
    min-height:100vh;
    font-family:Arial,sans-serif;
    background:linear-gradient(to bottom right, white, #4facfe);
    text-align:center;
    padding:20px;
}

h1{
    font-size:48px;
    margin-bottom:10px;
}
h2{
    font-size:32px;
}

h3{
    margin:10px 0 30px;
    color:#555;
}

.section{
    width:100%;
    margin:35px 0;
}

.post{
    display:inline-block;
    min-width:320px;
    padding:12px 35px;
    border-radius:12px;
    color:white;
    font-size:24px;
    font-weight:bold;
    margin-bottom:20px;
}

.candidates{
    width:100%;
    display:flex;
    justify-content:space-evenly;
    align-items:center;
    flex-wrap:wrap;
    gap:20px;
    font-size:20px;
}

label{
    background:white;
    padding:12px 20px;
    border-radius:10px;
    border:2px solid #ddd;
}

input[type="radio"]{
    transform:scale(1.5);
    margin-right:8px;
}

input[type="submit"]{
    display:block;
    margin:50px auto;
    padding:15px 50px;
    font-size:22px;
    background:#28a745;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

input[type="submit"]:hover{
    background:#218838;
}
body{
    font-family:Arial,sans-serif;
    text-align:center;
}

.section{
    margin:30px auto;
    width:80%;
}

.post{
    display:inline-block;
    background:#4A90E2;
    color:white;
    padding:10px 25px;
    border-radius:10px;
    font-size:22px;
    font-weight:bold;
    margin-bottom:15px;
}

.candidates{
    display:flex;
    justify-content:center;
    gap:30px;
    flex-wrap:wrap;
}

input[type="submit"]{
    margin-top:40px;
    padding:12px 30px;
    font-size:18px;
    background:#28a745;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}
.title-box{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:30px;
    margin:20px 0;
}

.logo{
    width:90px;
    height:90px;
}

.title-box h2{
    margin:0;
    font-size:34px;
    color:#003366;
}

.title-box h3{
    margin:5px 0 0;
    color:#555;
    font-size:20px;
}
</style>

</head>

<body>
<form action="/vote" method="POST">
    <div class="watermark">
    <img src="{{ url_for('static', filename='10406.png') }}" alt="MLZS Logo">
</div>

<h1>Mount Litera Zee School</h1>
<div class="title-box">

    <img src="{{ url_for('static', filename='10406.png') }}" class="logo">

    <div>

    <img src="{{ url_for('static', filename='10406.png') }}" class="logo">

<div class="section">

</div>

</form>

</html>
