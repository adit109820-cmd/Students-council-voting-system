<!DOCTYPE html>
<html>
<head>
    <title>Election Results</title>

    <style>
        body{
            font-family: Arial;
            background:#f2f2f2;
            text-align:center;
        }

        h1{
            margin-top:20px;
        }

        table{
            margin:auto;
            margin-bottom:30px;
            border-collapse:collapse;
            width:60%;
            background:white;
        }

        th,td{
            border:1px solid black;
            padding:10px;
        }

        th{
            background:#4CAF50;
            color:white;
        }
    </style>
</head>

<body>

<h1>Student Council Election Results</h1>

{% for post, candidates in results.items() %}

<h2>{{ post }}</h2>

<table>
<tr>
    <th>Candidate</th>
    <th>Total Votes</th>
</tr>

{% for candidate, votes in candidates %}
<tr>
    <td>{{ candidate }}</td>
    <td>{{ votes }}</td>
</tr>
{% endfor %}

</table>

{% endfor %}

</body>
</html>
